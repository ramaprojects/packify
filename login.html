<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packify — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-card">

        <div class="login-logo">
            <div class="login-logo-icon">📦</div>
            <div>
                <div class="login-logo-text">Packify</div>
                <div class="login-logo-sub">Sistem Packing Internal</div>
            </div>
        </div>

        <div id="error-msg" class="error-msg">Password salah. Coba lagi.</div>

        <!-- Pilih Operator -->
        <div class="form-group">
            <label class="form-label">Kamu siapa?</label>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" id="operator-picker">
                <button class="operator-btn" data-name="ram">ram</button>
                <button class="operator-btn" data-name="nab">nab</button>
                <button class="operator-btn" data-name="wul">wul</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="input-password"
                placeholder="Masukkan password..." />
        </div>

        <button class="btn btn-primary btn-full btn-lg" id="btn-login" disabled>
            Masuk
        </button>

    </div>

    <style>
        .operator-btn {
            padding:       12px 8px;
            border:        1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background:    var(--white);
            font-family:   inherit;
            font-size:     14px;
            font-weight:   600;
            cursor:        pointer;
            transition:    all 0.15s;
            text-transform: capitalize;
            color:         var(--ink);
        }
        .operator-btn:active { transform: scale(0.96); }
        .operator-btn.selected {
            border-color: var(--accent);
            background:   var(--accent-lt);
            color:        var(--accent);
        }
    </style>

    <script src="app.js"></script>
    <script>
        const btnLogin     = document.getElementById('btn-login');
        const inputPwd     = document.getElementById('input-password');
        const errorMsg     = document.getElementById('error-msg');
        const operatorBtns = document.querySelectorAll('.operator-btn');

        let selectedOperator = '';

        // Restore operator terakhir
        const lastOp = getOperator();
        if (lastOp) {
            selectedOperator = lastOp;
            operatorBtns.forEach(b => {
                if (b.dataset.name === lastOp) b.classList.add('selected');
            });
        }

        function validateForm() {
            btnLogin.disabled = !(selectedOperator && inputPwd.value.trim());
        }

        operatorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                operatorBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedOperator = btn.dataset.name;
                validateForm();
                inputPwd.focus();
            });
        });

        inputPwd.addEventListener('input', validateForm);
        inputPwd.addEventListener('keyup', e => { if (e.key === 'Enter' && !btnLogin.disabled) doLogin(); });

        async function doLogin() {
            btnLogin.disabled    = true;
            btnLogin.textContent = 'Memeriksa...';
            errorMsg.classList.remove('show');

            try {
                const API_KEY = '09a638642848807261eca8fd3004a277dc01d2bffbf9a25f';
                const url = `${LINK_GAS}?action=login&operator=${encodeURIComponent(selectedOperator)}&password=${encodeURIComponent(inputPwd.value.trim())}&key=${API_KEY}`;
                const res = await fetch(url, { method: 'GET', redirect: 'follow' });
                const txt = await res.text();
                const result = JSON.parse(txt);

                if (result.status === 'success') {
                    setOperator(selectedOperator);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'index.html';
                } else {
                    throw new Error(result.message || 'Password salah');
                }
            } catch (err) {
                errorMsg.textContent = err.message || 'Terjadi kesalahan.';
                errorMsg.classList.add('show');
                btnLogin.disabled    = false;
                btnLogin.textContent = 'Masuk';
            }
        }

        btnLogin.addEventListener('click', doLogin);

        // Kalau sudah login, langsung redirect
        if (localStorage.getItem('isLoggedIn') === 'true' && getOperator()) {
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
