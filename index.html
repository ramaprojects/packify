<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packify — Dashboard</title>
    <script src="auth-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    
    
    <style>
        .skeleton-text {
            position:      relative;
            color:         transparent !important;
            border-radius: 6px;
            overflow:      hidden;
            min-width:     80px;
            display:       inline-block;
        }
        .skeleton-text::after {
            content:    '';
            position:   absolute;
            inset:      0;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.15) 0%,
                rgba(255,255,255,0.40) 45%,
                rgba(255,255,255,0.15) 100%
            );
            background-size: 200% 100%;
            animation:  shimmer 1.4s infinite;
            border-radius: inherit;
        }
        @keyframes shimmer {
            0%   { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* ── Leaderboard skeleton ── */
        .leaderboard-skeleton { padding: 4px 0; }
        .leaderboard-skeleton-row {
            display:     flex;
            align-items: center;
            gap:         12px;
            padding:     12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .leaderboard-skeleton-row:last-child { border-bottom: none; }
        .sk-block {
            border-radius: 6px;
            overflow:      hidden;
            position:      relative;
            background:    #e8e8e8;
        }
        .sk-block::after {
            content:    '';
            position:   absolute;
            inset:      0;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0)    0%,
                rgba(255,255,255,0.6) 45%,
                rgba(255,255,255,0)  100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        .sk-rank { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
        .sk-name { flex: 1;    height: 14px; }
        .sk-poin { width: 60px; height: 14px; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <i class="bi bi-box-seam-fill" style="font-size:22px;color:var(--accent);flex-shrink:0;"></i>
        <h6>Dashboard</h6>
        <div style="width:36px"></div>
    </header>

    <div class="page-content page-transition-wrap">

        <!-- POIN BANNER -->
        <div class="poin-banner" id="poin-banner">
            <i class="bi bi-star-fill" style="font-size:36px;flex-shrink:0;color:#FFD166;"></i>
            <div class="poin-banner-info">
                <div class="poin-banner-name" id="banner-name">Halo!</div>
                <div class="poin-banner-val skeleton-text" id="banner-poin">— poin</div>
                <div class="poin-banner-streak skeleton-text" id="banner-streak">🔥 — hari streak</div>
            </div>
            <div id="banner-badges" style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;"></div>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="stat-pending">0</div>
                <div class="stat-label">Menunggu Resi</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-today">0</div>
                <div class="stat-label">Selesai Hari Ini</div>
            </div>
        </div>

        <!-- CTA -->
        <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:24px;"
            onclick="navigateTo('checklist.html')">
            + Mulai Packing Baru
        </button>

        <!-- LEADERBOARD -->
        <div class="section-title">🏆 Leaderboard Minggu Ini</div>
        <div class="card" style="margin-bottom:24px;">
            <div id="leaderboard-list">
                <div class="leaderboard-skeleton">
                    <div class="leaderboard-skeleton-row">
                        <div class="sk-block sk-rank"></div>
                        <div class="sk-block sk-name"></div>
                        <div class="sk-block sk-poin"></div>
                    </div>
                    <div class="leaderboard-skeleton-row">
                        <div class="sk-block sk-rank"></div>
                        <div class="sk-block sk-name"></div>
                        <div class="sk-block sk-poin"></div>
                    </div>
                    <div class="leaderboard-skeleton-row">
                        <div class="sk-block sk-rank"></div>
                        <div class="sk-block sk-name"></div>
                        <div class="sk-block sk-poin"></div>
                    </div>
                </div>
            </div>
            <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                <small class="text-muted" id="leaderboard-period" style="font-size:11px;"></small>
                <small class="text-muted" id="last-updated" style="font-size:11px;"></small>
            </div>
        </div>

        <!-- BADGE SHELF -->
        <div class="section-title">🎖️ Badge Kamu</div>
        <div class="card" style="margin-bottom:24px;">
            <div class="badge-shelf" id="badge-shelf">
                <div class="empty-state" style="padding:16px;width:100%;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- AKTIVITAS TERKINI -->
        <div class="section-title">Aktivitas Terkini</div>
        <div id="recent-list">
            <div class="empty-state">
                <div class="spinner"></div>
            </div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav-root"></nav>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
    <script>

        // ── Render Stats (lokal) ──────────────────
        function renderStats() {
            const sessions = loadAllSessions();
            const todayStart = new Date();
            todayStart.setHours(0, 0, 0, 0);

            const pending = sessions.filter(s => getStatus(s) === 'PENDING_RESI').length;
            const today   = sessions.filter(s => {
                const d = getWaktuSelesai(s) ? parseDate(getWaktuSelesai(s)) : null;
                return ['DONE', 'SYNCED'].includes(getStatus(s)) && d && d >= todayStart;
            }).length;

            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-today').textContent   = today;
        }

        // ── Render Aktivitas Terkini ──────────────
        function renderRecent() {
            const container = document.getElementById('recent-list');
            const sessions  = loadAllSessions();
            const recent    = [...sessions]
                .sort((a, b) => parseDate(getWaktuDibuat(b)) - parseDate(getWaktuDibuat(a)))
                .slice(0, 5);

            if (!recent.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-tray" style="font-size:40px;margin-bottom:4px;color:var(--muted);"></i>
                        <div class="empty-text">Belum ada aktivitas</div>
                        <div class="empty-sub">Mulai sesi packing pertamamu</div>
                    </div>`;
                return;
            }

            container.innerHTML = recent.map(s => {
                const badge  = getStatusBadge(getStatus(s));
                const id     = getSessionID(s);
                return `
                    <a class="history-item" href="history.html">
                        <div class="history-item-info">
                            <div class="history-item-name">${getPenerima(s)}</div>
                            <div class="history-item-sub">${getJenis(s)} · ${getPlatform(s)} · ${formatDate(getWaktuDibuat(s))}</div>
                        </div>
                        <span class="badge ${badge.cls}">${badge.label}</span>
                    </a>`;
            }).join('');
        }

        // ── Render Poin Banner ────────────────────
        function renderBanner(gamifData) {
            const op      = getOperator();
            const myData  = gamifData?.[op] || {};
            const poin    = myData.poinTotal  || 0;
            const streak  = myData.streak     || getStreakLocal(op);
            const badges  = myData.badges     || [];

            const elPoin   = document.getElementById('banner-poin');
            const elStreak = document.getElementById('banner-streak');

            elPoin.textContent   = `${poin} poin`;
            elStreak.textContent = `${streak} hari streak`;

            // Lepas skeleton shimmer setelah data nyata masuk
            if (gamifData) {
                elPoin.classList.remove('skeleton-text');
                elStreak.classList.remove('skeleton-text');
            }

            document.getElementById('banner-name').textContent = `Halo, ${op}! 👋`;

            // Badge icon di pojok banner (max 3)
            const earnedBadges = BADGES.filter(b => badges.includes(b.id)).slice(0, 3);
            const badgeEl = document.getElementById('banner-badges');
            badgeEl.innerHTML = earnedBadges.map(b =>
                `<span title="${b.label}"><i class="${b.icon}" style="font-size:22px;color:rgba(255,255,255,0.9);"></i></span>`
            ).join('');
        }

        // ── Render Leaderboard ────────────────────
        function renderLeaderboard(gamifData) {
            const container = document.getElementById('leaderboard-list');
            const periodEl  = document.getElementById('leaderboard-period');

            // Hitung poin minggu ini per operator
            const weekStart  = getWeekStart();
            const sessions   = loadAllSessions();
            const weekPoin   = {};
            OPERATORS.forEach(op => weekPoin[op] = 0);

            sessions.forEach(s => {
                const op  = getPetugas(s);
                const fin = getWaktuSelesai(s);
                if (!fin || !OPERATORS.includes(op)) return;
                if ((fin.split('T')[0] || fin.split(' ')[0]) >= weekStart && ['DONE','SYNCED'].includes(getStatus(s))) {
                    weekPoin[op] = (weekPoin[op] || 0) + (getPoin(s) || 0);
                }
            });

            // Merge dengan data server jika ada
            if (gamifData) {
                OPERATORS.forEach(op => {
                    const srv = gamifData[op]?.poinMingguIni;
                    if (srv !== undefined) weekPoin[op] = srv;
                });
            }

            const sorted = OPERATORS
                .map(op => ({ op, poin: weekPoin[op] || 0 }))
                .sort((a, b) => b.poin - a.poin);

            const rankClass = ['rank-1', 'rank-2', 'rank-3'];
            const rankEmoji = ['1', '2', '3'];

            container.innerHTML = sorted.map((item, i) => `
                <div class="leaderboard-item">
                    <div class="leaderboard-rank ${rankClass[i]}">${rankEmoji[i]}</div>
                    <div class="leaderboard-name">${item.op}</div>
                    <div class="leaderboard-poin">${item.poin} poin</div>
                </div>
            `).join('');

            // Label periode
            const ws  = new Date(weekStart);
            const we  = new Date(ws); we.setDate(we.getDate() + 6);
            const fmt = d => d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            periodEl.textContent = `Periode: ${fmt(ws)} – ${fmt(we)}`;
        }

        // ── Render Badge Shelf ────────────────────
        function renderBadgeShelf(earnedIds = []) {
            const shelf = document.getElementById('badge-shelf');
            shelf.innerHTML = BADGES.map(b => `
                <div class="badge-item ${earnedIds.includes(b.id) ? 'unlocked' : 'locked'}"
                    title="${b.desc}">
                    <i class="${b.icon}" style="font-size:26px;"></i>
                    <span class="badge-name">${b.label}</span>
                </div>
            `).join('');
        }

        // ── Fetch Gamifikasi dari Server ──────────
        async function fetchGamifData() {
            try {
                const res    = await fetch(`${LINK_GAS}?action=get_gamif&key=${API_KEY}`, { redirect: 'follow' });
                const text   = await res.text();
                const result = JSON.parse(text);
                if (result.status === 'success') return result.data;
            } catch (err) {
                console.warn('Gagal fetch gamif, pakai data lokal:', err);
            }
            return null;
        }

        // ── INIT ──────────────────────────────────
        async function init() {
            renderStats();
            renderRecent();
            updateResiNavBadge();

            // Render dari data lokal dulu (cepat)
            const op = getOperator();
            renderBanner(null);
            renderLeaderboard(null);
            renderBadgeShelf([]);

            // Fetch data gamif dari server
            const gamifData = await fetchGamifData();
            if (gamifData) {
                renderBanner(gamifData);
                renderLeaderboard(gamifData);
                const myBadges = gamifData[op]?.badges || [];
                renderBadgeShelf(myBadges);

                // Simpan ke cache lokal supaya profile.html bisa baca
                const cache = loadGamifCache();
                Object.keys(gamifData).forEach(operator => {
                    const d = gamifData[operator];
                    cache['poin_'   + operator] = d.poinTotal || 0;
                    cache['streak_' + operator] = d.streak    || 0;
                    cache['badges_' + operator] = d.badges    || [];
                });
                saveGamifCache(cache);

                // Update timestamp
                const el = document.getElementById('last-updated');
                if (el) el.textContent = 'Diperbarui ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            } else {
                // Fallback: hitung dari lokal
                const streak = getStreakLocal(op);
                const totalDone = loadAllSessions().filter(s =>
                    getPetugas(s) === op && ['DONE','SYNCED'].includes(getStatus(s))
                ).length;
                const localPoin = loadAllSessions()
                    .filter(s => getPetugas(s) === op && ['DONE','SYNCED'].includes(getStatus(s)))
                    .reduce((sum, s) => sum + (getPoin(s) || 0), 0);

                const fakeStats = { totalDone, streak, isTopWeekly: false };
                const earnedBadges = BADGES.filter(b => b.check(fakeStats)).map(b => b.id);

                // Fake gamifData untuk render lokal
                const localGamif = {};
                localGamif[op] = { poinTotal: localPoin, streak, badges: earnedBadges };
                renderBanner(localGamif);
                renderBadgeShelf(earnedBadges);
            }
        }

        init();

        // ── Auto-refresh setiap 60 detik ─────────────────────────
        // Hanya refresh kalau tab aktif, biar tidak boros battery
        let refreshTimer = null;

        function startAutoRefresh() {
            stopAutoRefresh();
            refreshTimer = setInterval(async () => {
                // Refresh stats lokal
                renderStats();
                renderRecent();
                updateResiNavBadge();

                // Fetch ulang gamif dari server (leaderboard)
                const gamifData = await fetchGamifData();
                if (gamifData) {
                    renderBanner(gamifData);
                    renderLeaderboard(gamifData);
                    const myBadges = gamifData[getOperator()]?.badges || [];
                    renderBadgeShelf(myBadges);
                }
            }, 60_000);
        }

        function stopAutoRefresh() {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        }

        // Pause saat tab tidak aktif, resume saat aktif lagi
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopAutoRefresh();
            else {
                // Langsung refresh sekali saat balik ke tab
                renderStats();
                renderRecent();
                updateResiNavBadge();
                fetchGamifData().then(d => {
                    if (d) {
                        renderBanner(d);
                        renderLeaderboard(d);
                        renderBadgeShelf(d[getOperator()]?.badges || []);
                    }
                });
                startAutoRefresh();
            }
        });

        startAutoRefresh();
    </script>

</body>
</html>
