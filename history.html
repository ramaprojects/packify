<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packify — History</title>
    <script src="auth-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <header class="app-header">
        <button class="btn-back" onclick="navigateTo('index.html')">←</button>
        <h6>History</h6>
        <button id="btn-wa" title="Kirim laporan WhatsApp"
            style="width:36px;height:36px;background:none;border:none;cursor:pointer;
                   display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="bi bi-send-fill" style="font-size:18px;color:var(--accent);"></i>
        </button>
    </header>

    <div class="page-content page-transition-wrap" style="padding-top:8px;">

        <!-- Sync status banner -->
        <div id="sync-banner" class="d-none"
            style="background:var(--red-lt);border:1px solid #f5c6cb;border-radius:var(--radius);
                   padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
            <i class="bi bi-exclamation-triangle-fill" style="font-size:22px;color:var(--red);flex-shrink:0;"></i>
            <div style="flex:1;">
                <div style="font-weight:600;font-size:13px;color:var(--red);" id="sync-banner-text">
                    Beberapa sesi gagal sync
                </div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px;">
                    Data tersimpan lokal, belum masuk ke sheet
                </div>
            </div>
            <button class="btn btn-sm" id="btn-retry-sync"
                style="background:var(--red);color:#fff;flex-shrink:0;white-space:nowrap;">
                Retry
            </button>
        </div>

        <!-- Search & Filter -->
        <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input type="text" class="form-control" id="input-search"
                placeholder="Cari penerima atau resi..." style="flex:1;" />
            <select class="form-select" id="filter-status" style="width:auto;flex-shrink:0;">
                <option value="">Semua</option>
                <option value="PENDING_RESI">Belum Resi</option>
                <option value="DONE">Selesai</option>
            </select>
        </div>

        <!-- List -->
        <div id="history-list"></div>

    </div>

    <!-- ══ MODAL: Detail Sesi ════════════════════════════════ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <div class="modal-body">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                    <div style="font-size:18px;font-weight:700;" id="modal-penerima">—</div>
                    <span class="badge" id="modal-status-badge">—</span>
                </div>

                <!-- Info grid -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
                    <div style="background:var(--paper);border-radius:var(--radius-sm);padding:10px;">
                        <div style="font-size:11px;color:var(--muted);">Jenis</div>
                        <div style="font-weight:600;font-size:13px;" id="modal-jenis">—</div>
                    </div>
                    <div style="background:var(--paper);border-radius:var(--radius-sm);padding:10px;">
                        <div style="font-size:11px;color:var(--muted);">Platform</div>
                        <div style="font-weight:600;font-size:13px;" id="modal-platform">—</div>
                    </div>
                    <div style="background:var(--paper);border-radius:var(--radius-sm);padding:10px;">
                        <div style="font-size:11px;color:var(--muted);">Operator</div>
                        <div style="font-weight:600;font-size:13px;" id="modal-operator">—</div>
                    </div>
                    <div style="background:var(--paper);border-radius:var(--radius-sm);padding:10px;">
                        <div style="font-size:11px;color:var(--muted);">Poin</div>
                        <div style="font-weight:600;font-size:13px;" id="modal-poin">—</div>
                    </div>
                </div>

                <!-- Nomor Resi -->
                <div style="margin-bottom:12px;" id="modal-resi-wrap">
                    <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Nomor Resi</div>
                    <div class="font-mono" style="font-size:14px;font-weight:500;
                        background:var(--paper);padding:10px 12px;border-radius:var(--radius-sm);"
                        id="modal-resi-number">—</div>
                </div>

                <!-- Foto Resi -->
                <div id="modal-foto-resi-wrap" style="margin-bottom:12px;display:none;">
                    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Foto Resi</div>
                    <img id="modal-foto-resi" src="" alt="Foto Resi"
                        style="width:100%;max-height:200px;object-fit:contain;
                               border-radius:var(--radius);border:1px solid var(--border);"
                        onerror="this.style.display='none'" />
                </div>

                <!-- Foto Checklist -->
                <div id="modal-checklist-wrap" style="display:none;">
                    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Foto Checklist</div>
                    <div id="modal-checklist-photos"
                        style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
                </div>

                <div style="font-size:11px;color:var(--muted);margin-top:12px;" id="modal-time">—</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btn-modal-close">Tutup</button>
                <button class="btn btn-danger" id="btn-modal-delete">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Panel: Generate Laporan WA -->
    <div class="panel-overlay" id="wa-overlay"></div>
    <div class="bottom-panel" id="wa-panel">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <div class="panel-title">Generate Laporan WA</div>
            <button class="btn-close-panel" id="btn-close-wa">✕</button>
        </div>
        <div class="panel-body">
            <!-- Anggota hadir -->
            <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Anggota hadir <span style="color:var(--muted);font-weight:400;">(pisah koma)</span></label>
                <input type="text" class="form-control" id="wa-anggota"
                    placeholder="Wulan, Rama" />
            </div>
            <!-- Stay laptop -->
            <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Stay Laptop</label>
                <select class="form-control" id="wa-stay">
                    <option value="">— Pilih operator —</option>
                </select>
            </div>
            <!-- Pendaftaran -->
            <div class="form-group" style="margin-bottom:20px;">
                <label class="form-label">Pendaftaran <span style="color:var(--muted);font-weight:400;">(satu per baris, kosongkan jika tidak ada)</span></label>
                <textarea class="form-control" id="wa-pendaftaran" rows="3"
                    placeholder="Nama toko&#10;Nama merchant" style="resize:none;"></textarea>
            </div>

            <!-- Preview ringkasan -->
            <div id="wa-preview" style="background:var(--paper);border-radius:var(--radius);
                padding:14px;margin-bottom:20px;font-size:12px;line-height:1.7;
                font-family:'DM Mono',monospace;color:var(--ink);white-space:pre-wrap;
                max-height:220px;overflow-y:auto;border:1.5px solid var(--border);">
                Isi anggota hadir untuk preview...
            </div>

            <button class="btn btn-primary btn-full btn-lg" id="btn-kirim-wa"
                style="gap:8px;">
                <i class="bi bi-whatsapp"></i> Buka WhatsApp
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav id="bottom-nav-root"></nav>

    <script src="app.js"></script>
    <script>

    // ── State ─────────────────────────────────────────────────
    let allSessions  = [];
    let activeSession = null;

    // ── Toggle Group ──────────────────────────────────────────
    function toggleGroup(date) {
        const group  = document.querySelector(`.date-group[data-date="${date}"]`);
        const header = group.querySelector('.date-group-header');
        const body   = group.querySelector('.date-group-body');
        const chev   = group.querySelector('.date-group-chevron');
        const isOpen = header.classList.contains('open');

        if (isOpen) {
            body.style.display  = 'none';
            chev.textContent    = '▼';
            header.classList.remove('open');
        } else {
            body.style.display  = 'block';
            chev.textContent    = '▲';
            header.classList.add('open');
        }
    }

    // ── Render List ───────────────────────────────────────────
    function renderList() {
        const container   = document.getElementById('history-list');
        const searchQ     = document.getElementById('input-search').value.toLowerCase().trim();
        const filterStatus = document.getElementById('filter-status').value;

        let sessions = [...allSessions]
            .filter(s => getStatus(s) !== 'DRAFT') // DRAFT tidak ditampilkan
            .sort((a, b) => parseDate(getWaktuDibuat(b)) - parseDate(getWaktuDibuat(a)));

        // Filter
        if (searchQ) {
            sessions = sessions.filter(s =>
                String(getPenerima(s) || '').toLowerCase().includes(searchQ) ||
                String(getNomorResi(s) || '').toLowerCase().includes(searchQ)
            );
        }
        if (filterStatus) {
            sessions = sessions.filter(s => getStatus(s) === filterStatus);
        }

        if (!sessions.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-tray" style="font-size:40px;margin-bottom:4px;color:var(--muted);"></i>
                    <div class="empty-text">Tidak ada sesi</div>
                    <div class="empty-sub">Coba ubah filter atau mulai sesi baru</div>
                </div>`;
            return;
        }

        // Group by tanggal
        const groups = {};
        sessions.forEach(s => {
            const raw = getWaktuDibuat(s) || ''; const key = (raw.split('T')[0] || raw.split(' ')[0] || 'unknown').split(' ')[0];
            if (!groups[key]) groups[key] = [];
            groups[key].push(s);
        });

        const today = getTodayKey();

        container.innerHTML = Object.entries(groups).map(([date, items]) => {
            const label      = date === today ? 'Hari Ini'
                : date === getPrevDayKey(today) ? 'Kemarin'
                : formatDate(date + 'T00:00:00');
            // Hari ini otomatis terbuka, sisanya collapsed
            const isOpen     = date === today;
            const totalPoin  = items.reduce((sum, s) => sum + (getPoin(s) || 0), 0);
            const doneCount  = items.filter(s => ['DONE','SYNCED'].includes(getStatus(s))).length;

            return `
                <div class="date-group" data-date="${date}">
                    <div class="date-group-header ${isOpen ? 'open' : ''}" onclick="toggleGroup('${date}')">
                        <div style="flex:1;">
                            <span class="date-group-label" style="padding:0;margin:0;">${label}</span>
                            <span style="font-size:11px;color:var(--muted);margin-left:8px;">
                                ${items.length} sesi · ${doneCount} selesai · ${totalPoin} poin
                            </span>
                        </div>
                        <span class="date-group-chevron">${isOpen ? '▲' : '▼'}</span>
                    </div>
                    <div class="date-group-body" style="display:${isOpen ? 'block' : 'none'};">
                        ${items.map(s => {
                            const badge = getStatusBadge(getStatus(s));
                            const id    = getSessionID(s);
                            return `
                                <div class="history-item" data-id="${id}" style="cursor:pointer;margin-bottom:6px;">
                                    <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;width:32px;">
                                        ${['DONE','SYNCED'].includes(getStatus(s))
                                            ? '<i class="bi bi-check-circle-fill" style="font-size:24px;color:var(--accent);"></i>'
                                            : '<i class="bi bi-box-seam" style="font-size:24px;color:var(--muted);"></i>'}
                                    </div>
                                    <div class="history-item-info">
                                        <div class="history-item-name">${getPenerima(s)}</div>
                                        <div class="history-item-sub">
                                            ${getJenis(s)} · ${getPlatform(s)} · ${getPetugas(s)}
                                            · ${formatTime(getWaktuDibuat(s))}
                                        </div>
                                    </div>
                                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                                        <span class="badge ${badge.cls}">${badge.label}</span>
                                        <span class="poin-chip"><i class="bi bi-star-fill" style="font-size:11px;"></i> ${getPoin(s)}</span>
                                        ${s.syncStatus === 'FAILED'
                                            ? `<span class="badge badge-red" style="font-size:10px;"><i class="bi bi-exclamation-triangle-fill" style="font-size:10px;"></i> Gagal sync</span>`
                                            : ''}
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');

        // Bind klik
        container.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const s  = allSessions.find(x => getSessionID(x) === id);
                if (s) openModal(s);
            });
        });
    }

    // ── Modal ─────────────────────────────────────────────────
    function openModal(session) {
        activeSession = session;
        const modalOverlay = document.getElementById('modal-overlay');

        const badge = getStatusBadge(getStatus(session));
        document.getElementById('modal-penerima').textContent     = getPenerima(session);
        document.getElementById('modal-status-badge').textContent = badge.label;
        document.getElementById('modal-status-badge').className   = `badge ${badge.cls}`;
        document.getElementById('modal-jenis').textContent        = getJenis(session);
        document.getElementById('modal-platform').textContent     = getPlatform(session);
        document.getElementById('modal-operator').textContent     = getPetugas(session);
        document.getElementById('modal-poin').textContent = `${getPoin(session)} poin`;
        document.getElementById('modal-resi-number').textContent  = getNomorResi(session);

        const waktuDibuat  = getWaktuDibuat(session);
        const waktuSelesai = getWaktuSelesai(session);
        document.getElementById('modal-time').textContent =
            `Dibuat: ${formatDate(waktuDibuat)} ${formatTime(waktuDibuat)}` +
            (waktuSelesai ? ` · Selesai: ${formatTime(waktuSelesai)}` : '');

        // Foto resi
        const fotoUrl = getFotoResi(session);
        const fotoWrap = document.getElementById('modal-foto-resi-wrap');
        if (fotoUrl) {
            document.getElementById('modal-foto-resi').src = toDriveDirectUrl(fotoUrl);
            fotoWrap.style.display = 'block';
        } else {
            fotoWrap.style.display = 'none';
        }

        // Foto checklist
        const checklist = getChecklist(session);
        const ckWrap    = document.getElementById('modal-checklist-wrap');
        const ckPhotos  = document.getElementById('modal-checklist-photos');
        const ckWithPhotos = checklist.filter(i => i.photoId || i.photoPreview);
        if (ckWithPhotos.length) {
            ckPhotos.innerHTML = ckWithPhotos.map(i => {
                const url = toDriveDirectUrl(i.photoId || i.photoPreview);
                return `
                    <div style="position:relative;">
                        <img src="${url}" alt="${i.label}"
                            style="width:100%;aspect-ratio:1;object-fit:cover;
                                   border-radius:var(--radius-sm);border:1px solid var(--border);"
                            onerror="this.parentElement.style.display='none'" />
                        <div style="position:absolute;bottom:0;left:0;right:0;
                            background:rgba(0,0,0,0.55);color:#fff;font-size:9px;
                            padding:3px 5px;border-radius:0 0 var(--radius-sm) var(--radius-sm);
                            text-align:center;font-weight:600;">${i.label}</div>
                    </div>`;
            }).join('');
            ckWrap.style.display = 'block';
        } else {
            ckWrap.style.display = 'none';
        }

        modalOverlay.classList.add('show');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('show');
        activeSession = null;
    }

    document.getElementById('btn-modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ── Delete ────────────────────────────────────────────────
    document.getElementById('btn-modal-delete').addEventListener('click', () => {
        if (!activeSession) return;
        const id = getSessionID(activeSession);
        if (!confirm(`Hapus sesi ${getPenerima(activeSession)}?`)) return;

        allSessions = allSessions.filter(s => getSessionID(s) !== id);
        saveAllSessions(allSessions);
        closeModal();
        renderList();
        updateResiNavBadge();
        showToast('Sesi dihapus', '');
    });

    // ── WhatsApp Report ───────────────────────────────────────
    const WA_GRUP = '6281234567890'; // ← ganti dengan nomor WA grup tim

    function getTodaySessions() {
        const today      = getTodayKey();
        const todayStart = new Date(today + 'T00:00:00');
        return {
            edc:      allSessions.filter(s => {
                          const fin = getWaktuSelesai(s);
                          const jenis = getJenis(s) || '';
                          return ['DONE','SYNCED'].includes(getStatus(s)) && fin
                              && (parseDate(fin) || 0) >= todayStart
                              && ['T1','T3','M3','Saku','Retur'].includes(jenis);
                      }),
            ecommerce: allSessions.filter(s => {
                          const fin = getWaktuSelesai(s);
                          const jenis = getJenis(s) || '';
                          return ['DONE','SYNCED'].includes(getStatus(s)) && fin
                              && (parseDate(fin) || 0) >= todayStart
                              && ['Thermal','Kaos'].includes(jenis);
                      }),
        };
    }

    function generateLaporan(anggota, stay, pendaftaran) {
        const today   = getTodayKey();
        const { edc, ecommerce } = getTodaySessions();

        // Format tanggal Indonesia
        const tgl = new Date(today + 'T00:00:00')
            .toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

        const lines = [];

        // Header
        lines.push(`🧑🏻‍🔧👩🏻‍🔧 *[REPORTING TIM SUPPORT EDC]*`);
        lines.push(`Tanggal : ${tgl}`);
        lines.push(`Anggota : ${anggota || '-'}`);
        lines.push(`Stay Laptop : ${stay || '-'}`);
        // Pendaftaran — split per baris
        const daftarList = pendaftaran
            ? pendaftaran.split('\n').map(s => s.trim()).filter(Boolean)
            : [];
        lines.push(`Pendaftaran : ${daftarList.length || '-'}`);
        if (daftarList.length) daftarList.forEach(n => lines.push(n));
        lines.push(``);

        // Packing EDC
        lines.push(`Packing EDC : ${edc.length}`);
        if (edc.length) {
            edc.forEach(s => lines.push(getPenerima(s)));
        } else {
            lines.push(`-`);
        }
        lines.push(``);

        // Packing Ecommerce
        lines.push(`Packing Selain EDC :`);
        lines.push(`Pesanan Ecommerce : ${ecommerce.length}`);
        if (ecommerce.length) {
            ecommerce.forEach(s => {
                const jenis    = getJenis(s) || '-';
                const platform = getPlatform(s) || '-';
                lines.push(`${jenis.toUpperCase()} - ${platform.toUpperCase()}`);
            });
        } else {
            lines.push(`-`);
        }
        lines.push(``);

        // Stok asset — ambil dari cache lokal
        const stok = loadStokCache();
        if (stok && stok.length) {
            lines.push(`📁 *UPDATE STOCK ASSET*`);
            stok.forEach(item => {
                const val     = formatStokWA(item);
                const warning = item.stok <= item.threshold ? ' ⚠️' : '';
                lines.push(`- ${item.nama}: ${val}${warning}`);
            });
            if (stok.some(i => i.stok <= i.threshold)) {
                lines.push(``);
                lines.push(`*note: tanda "⚠️" berarti stok menipis`);
            }
        }

        return lines.join('\n');
    }

    function formatStokWA(item) {
        if (item.id === 'thermal') {
            const pcs  = item.stok;
            const pack = Math.floor(pcs / 10);
            const sisa = pcs % 10;
            if (pack >= 10) {
                const box = Math.floor(pack / 10);
                const sp  = pack % 10;
                return box + ' box' + (sp ? ' ' + sp + ' pack' : '') + (sisa ? ' ' + sisa + ' pcs' : '');
            }
            return pack > 0 ? pack + ' pack' + (sisa ? ' ' + sisa + ' pcs' : '') : pcs + ' pcs';
        }
        return item.stok + ' ' + item.satuan;
    }

    // Cache stok di localStorage supaya history.html bisa akses tanpa fetch ulang
    const STOK_CACHE_KEY = 'packify_stok_cache';
    function loadStokCache() {
        try { return JSON.parse(localStorage.getItem(STOK_CACHE_KEY)) || null; }
        catch { return null; }
    }
    function saveStokCache(data) {
        localStorage.setItem(STOK_CACHE_KEY, JSON.stringify(data));
    }

    async function fetchStokForReport() {
        try {
            const res  = await fetch(`${LINK_GAS}?action=get_stock&key=${API_KEY}`, { redirect: 'follow' });
            const data = await res.json();
            if (data.status === 'success') saveStokCache(data.data);
        } catch(e) { /* pakai cache lama kalau gagal */ }
    }

    // ── Panel WA ─────────────────────────────────────────────
    function openWaPanel() {
        // Default anggota — nama lengkap semua operator
        const anggotaEl = document.getElementById('wa-anggota');
        if (!anggotaEl.value) {
            anggotaEl.value = OPERATORS.map(op => OPERATOR_NAMES[op] || op).join(', ');
        }

        // Populate dropdown stay laptop pakai nama lengkap
        const stayEl = document.getElementById('wa-stay');
        stayEl.innerHTML = '<option value="">— Pilih operator —</option>' +
            OPERATORS.map(op =>
                `<option value="${OPERATOR_NAMES[op] || op}">${OPERATOR_NAMES[op] || op}</option>`
            ).join('');

        document.getElementById('wa-panel').classList.add('show');
        document.getElementById('wa-overlay').classList.add('show');
        updateWaPreview();
    }
    function closeWaPanel() {
        document.getElementById('wa-panel').classList.remove('show');
        document.getElementById('wa-overlay').classList.remove('show');
    }

    function updateWaPreview() {
        const anggota     = document.getElementById('wa-anggota').value.trim();
        const stay        = document.getElementById('wa-stay').value.trim();
        const pendaftaran = document.getElementById('wa-pendaftaran').value.trim();
        document.getElementById('wa-preview').textContent = generateLaporan(anggota, stay, pendaftaran);
    }

    document.getElementById('btn-wa').addEventListener('click', openWaPanel);
    document.getElementById('btn-close-wa').addEventListener('click', closeWaPanel);
    document.getElementById('wa-overlay').addEventListener('click', closeWaPanel);
    document.getElementById('wa-anggota').addEventListener('input', updateWaPreview);
    document.getElementById('wa-stay').addEventListener('change', updateWaPreview);
    document.getElementById('wa-pendaftaran').addEventListener('input', updateWaPreview);

    document.getElementById('btn-kirim-wa').addEventListener('click', () => {
        const anggota     = document.getElementById('wa-anggota').value.trim();
        const stay        = document.getElementById('wa-stay').value.trim();
        const pendaftaran = document.getElementById('wa-pendaftaran').value.trim();
        const msg         = generateLaporan(anggota, stay, pendaftaran);
        const url         = `https://wa.me/${WA_GRUP}?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
        closeWaPanel();
    });

    // ── Filter & Search ───────────────────────────────────────
    document.getElementById('input-search').addEventListener('input', renderList);
    document.getElementById('filter-status').addEventListener('change', renderList);

    // ── Fetch dari server ─────────────────────────────────────
    async function fetchFromServer() {
        try {
            const res    = await fetch(`${LINK_GAS}?action=get_all&key=${API_KEY}`, { redirect: 'follow' });
            const text   = await res.text();
            const result = JSON.parse(text);
            if (result.status !== 'success' || !Array.isArray(result.data)) return;

            const serverData = result.data;
            const local      = loadAllSessions();
            const localIds   = new Set(local.map(s => getSessionID(s)));

            let merged = [...local];
            serverData.forEach(ss => {
                const normalised = normaliseSession(ss);
                const id  = getSessionID(normalised);
                const idx = merged.findIndex(s => getSessionID(s) === id);
                if (idx > -1) {
                    if (['DONE','SYNCED'].includes(getStatus(normalised))) {
                        merged[idx] = { ...merged[idx], ...normalised };
                    }
                } else {
                    merged.push(normalised);
                }
            });

            saveAllSessions(merged);
            allSessions = merged;
            renderList();
            updateResiNavBadge();
        } catch (err) {
            console.warn('Gagal fetch server history:', err);
        }
    }

    // ── Sync banner ───────────────────────────────────────────
    function updateSyncBanner() {
        const failed = getSyncFailedCount();
        const banner = document.getElementById('sync-banner');
        if (failed > 0) {
            document.getElementById('sync-banner-text').textContent =
                `${failed} sesi gagal sync ke sheet`;
            banner.style.display = 'flex';
            banner.classList.remove('d-none');
        } else {
            banner.style.display = 'none';
        }
    }

    document.getElementById('btn-retry-sync').addEventListener('click', async () => {
        const btn = document.getElementById('btn-retry-sync');
        btn.disabled    = true;
        btn.textContent = 'Mencoba...';

        const { success, failed } = await retrySyncQueue(id => {
            btn.textContent = `Sync...`;
        });

        btn.disabled    = false;
        btn.textContent = 'Retry';

        if (success > 0) showToast(`✅ ${success} sesi berhasil di-sync`, 'success');
        if (failed  > 0) showToast(`⚠️ ${failed} sesi masih gagal`, 'error');

        allSessions = loadAllSessions();
        renderList();
        updateSyncBanner();
    });

    // ── Init ──────────────────────────────────────────────────
    allSessions = loadAllSessions();
    updateResiNavBadge();
    updateSyncBanner();
    renderList();
    fetchFromServer();
    fetchStokForReport(); // cache stok untuk laporan WA
    </script>

</body>
</html>
