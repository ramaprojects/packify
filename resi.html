<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packify — Resi</title>
    <script src="auth-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    
    
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
</head>
<body>

    <header class="app-header">
        <button class="btn-back" onclick="navigateTo('index.html')">←</button>
        <h6>Input Resi</h6>
        <div style="width:36px"></div>
    </header>

    <div class="page-content page-transition-wrap">

        <!-- Empty state -->
        <div id="empty-state" class="empty-state d-none">
            <i class="bi bi-check-circle-fill" style="font-size:48px;color:var(--accent);margin-bottom:4px;"></i>
            <div class="empty-text">Semua sudah ada resi-nya!</div>
            <div class="empty-sub">Tidak ada antrian yang perlu diproses</div>
            <button class="btn btn-secondary" style="margin-top:16px;"
                onclick="navigateTo('index.html')">Kembali ke Dashboard</button>
        </div>

        <!-- Antrian list -->
        <div id="queue-list"></div>

    </div>

    <!-- ══ BOTTOM PANEL: Input Resi ══════════════════════════ -->
    <div class="panel-overlay" id="panel-overlay"></div>
    <div class="bottom-panel" id="resi-panel">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <div class="panel-title" id="panel-title">Input Resi</div>
            <button class="btn-close-panel" id="btn-close-panel">✕</button>
        </div>
        <div class="panel-body">

            <div style="background:var(--paper);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;">
                <div style="font-size:12px;color:var(--muted);">Penerima</div>
                <div style="font-weight:700;font-size:15px;margin-top:2px;" id="panel-penerima">—</div>
                <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="panel-detail">—</div>
            </div>

            <div class="form-group">
                <label class="form-label">Nomor Resi</label>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" class="form-control font-mono" id="input-resi"
                        placeholder="Masukkan atau scan resi..." autocomplete="off"
                        style="font-size:15px;letter-spacing:0.03em;flex:1;" />
                    <button class="btn btn-secondary" id="btn-scan-resi"
                        style="flex-shrink:0;padding:10px 14px;" title="Scan Barcode">
                        <i class="bi bi-upc-scan" style="font-size:20px;"></i>
                    </button>
                </div>
                <!-- Scanner viewfinder -->
                <div id="scan-wrap" style="display:none;margin-top:10px;position:relative;
                     border-radius:var(--radius);overflow:hidden;background:#000;">
                    <video id="scan-video" style="width:100%;display:block;max-height:220px;
                           object-fit:cover;"></video>
                    <!-- Crosshair overlay -->
                    <div style="position:absolute;inset:0;display:flex;align-items:center;
                                justify-content:center;pointer-events:none;">
                        <div style="width:60%;height:45%;border:2.5px solid var(--accent);
                                    border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,0.45);">
                        </div>
                    </div>
                    <button id="btn-stop-scan" style="position:absolute;top:8px;right:8px;
                        background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:20px;
                        padding:4px 10px;font-size:12px;cursor:pointer;">Batal</button>
                </div>
                <!-- Kurir terdeteksi -->
                <div id="kurir-chip" style="display:none;margin-top:8px;">
                    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Kurir</div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;" id="kurir-pills">
                        <button type="button" class="kurir-pill" data-value="JNE">
                            <i class="bi bi-geo-alt-fill"></i> JNE
                        </button>
                        <button type="button" class="kurir-pill" data-value="J&T Express">
                            <i class="bi bi-box-seam-fill"></i> J&T Express
                        </button>
                        <button type="button" class="kurir-pill" data-value="J&T Cargo">
                            <i class="bi bi-truck"></i> J&T Cargo
                        </button>
                        <button type="button" class="kurir-pill" data-value="SiCepat">
                            <i class="bi bi-lightning-fill"></i> SiCepat
                        </button>
                        <button type="button" class="kurir-pill" data-value="Lainnya">
                            <i class="bi bi-three-dots"></i> Lainnya
                        </button>
                    </div>
                    <!-- Hidden input sebagai pengganti select -->
                    <input type="hidden" id="kurir-select" value="">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Foto Label Resi</label>
                <div id="foto-preview-wrap" style="margin-bottom:10px;display:none;">
                    <img id="foto-preview" src="" alt="Preview"
                        style="width:100%;max-height:180px;object-fit:contain;
                               border-radius:var(--radius);border:1px solid var(--border);" />
                </div>
                <label class="btn btn-secondary btn-full" style="cursor:pointer;gap:8px;">
                    <i class="bi bi-camera" style="font-size:18px;"></i> Ambil / Pilih Foto
                    <input type="file" accept="image/*" capture="environment"
                        id="input-foto-resi" style="display:none;" />
                </label>
            </div>

            <button class="btn btn-primary btn-full btn-lg" id="btn-simpan-resi" disabled>
                Simpan & Selesaikan
            </button>

        </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Mengupload foto resi...</div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Bottom Nav -->
    <nav id="bottom-nav-root"></nav>

    <script src="app.js"></script>
    <script>


    // ── Panel ─────────────────────────────────────────────────
    const panel        = document.getElementById('resi-panel');
    const overlay      = document.getElementById('panel-overlay');
    const btnClose     = document.getElementById('btn-close-panel');
    const btnSimpan    = document.getElementById('btn-simpan-resi');
    const inputResi    = document.getElementById('input-resi');
    const inputFoto    = document.getElementById('input-foto-resi');
    const fotoWrap     = document.getElementById('foto-preview-wrap');
    const fotoPreview  = document.getElementById('foto-preview');

    let activeSessionId = null;
    let fotoFile        = null;

    function openPanel(session) {
        activeSessionId = getSessionID(session);
        document.getElementById('panel-penerima').textContent = getPenerima(session);
        document.getElementById('panel-detail').textContent   =
            `${getJenis(session)} · ${getPlatform(session)} · ${formatDate(getWaktuDibuat(session))}`;
        document.getElementById('panel-title').textContent    =
            `Resi — ${getPenerima(session)}`;

        inputResi.value  = '';
        fotoFile         = null;
        fotoWrap.style.display = 'none';
        fotoPreview.src  = '';
        btnSimpan.disabled = true;
        resetKurirChip();

        panel.classList.add('show');
        overlay.classList.add('show');
        setTimeout(() => inputResi.focus(), 300);
    }

    function closePanel() {
        stopScanner();
        panel.classList.remove('show');
        overlay.classList.remove('show');
        activeSessionId = null;
        fotoFile        = null;
    }

    btnClose.addEventListener('click', closePanel);
    overlay.addEventListener('click', closePanel);

    // ── Validasi form panel ───────────────────────────────────
    function validatePanel() {
        btnSimpan.disabled = !(inputResi.value.trim() && fotoFile);
    }

    inputResi.addEventListener('input', () => {
        validatePanel();
        updateKurirChip(inputResi.value.trim());
    });

    inputFoto.addEventListener('change', e => {
        const file = e.target.files?.[0];
        if (!file) return;
        fotoFile = file;
        const url = URL.createObjectURL(file);
        fotoPreview.src = url;
        fotoWrap.style.display = 'block';
        validatePanel();
    });

    // ── Simpan Resi ───────────────────────────────────────────
    btnSimpan.addEventListener('click', async () => {
        if (!activeSessionId || !fotoFile) return;

        // Snapshot dulu sebelum closePanel() me-reset semuanya ke null
        const sessionIdSnapshot  = activeSessionId;
        const fotoFileSnapshot   = fotoFile;
        const resiNumberSnapshot = inputResi.value.trim();
        const kurirSnapshot      = document.getElementById('kurir-select')?.value || '';

        closePanel();
        setLoading(true, 'Mengupload foto resi...');

        try {
            const allSessions = loadAllSessions();
            const session     = allSessions.find(s => getSessionID(s) === sessionIdSnapshot);
            if (!session) throw new Error('Sesi tidak ditemukan (ID: ' + sessionIdSnapshot + ')');

            // Upload foto
            const { photoUrl } = await uploadPhoto({
                sessionId:  getSessionID(session),
                type:       'resi',
                resiNumber: resiNumberSnapshot,
                penerima:   getPenerima(session),
                file:       fotoFileSnapshot,
            });

            // Update sesi lokal
            session.resi        = { number: resiNumberSnapshot, photoUrl };
            session.kurir       = kurirSnapshot;
            session.status      = STATUS.DONE;
            session.finishedAt  = now();

            const idx = allSessions.findIndex(s => getSessionID(s) === sessionIdSnapshot);
            if (idx > -1) allSessions[idx] = session;
            saveAllSessions(allSessions);

            // Sync ke server
            syncSession(session);

            showToast(`✅ Resi ${getPenerima(session)} berhasil disimpan!`, 'success');
            renderQueue();
            updateResiNavBadge();

        } catch (err) {
            showToast('Gagal: ' + err.message, 'error');
        } finally {
            setLoading(false);
        }
    });

    // ── Scan Barcode ──────────────────────────────────────────
    let codeReader = null;

    async function startScanner() {
        const scanWrap = document.getElementById('scan-wrap');
        const video    = document.getElementById('scan-video');
        scanWrap.style.display = 'block';

        try {
            codeReader = new ZXing.BrowserMultiFormatReader();

            // Di versi 0.19.x, listVideoInputDevices ada di instance, bukan static
            const devices = await codeReader.listVideoInputDevices();
            // Pilih kamera belakang kalau ada
            const backCam = devices.find(d =>
                /back|rear|environment/i.test(d.label)
            ) || devices[devices.length - 1];

            await codeReader.decodeFromVideoDevice(
                backCam?.deviceId || undefined,
                video,
                (result, err) => {
                    if (!result) return;
                    const text = result.getText();
                    inputResi.value = text;
                    updateKurirChip(text);
                    validatePanel();
                    stopScanner();
                    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
                    showToast('✅ Resi berhasil discan!', 'success');
                }
            );
        } catch (err) {
            stopScanner();
            showToast('Kamera tidak bisa diakses: ' + err.message, 'error');
        }
    }

    function stopScanner() {
        if (codeReader) {
            codeReader.reset();
            codeReader = null;
        }
        const scanWrap = document.getElementById('scan-wrap');
        if (scanWrap) scanWrap.style.display = 'none';
    }

    document.getElementById('btn-scan-resi').addEventListener('click', () => {
        const scanWrap = document.getElementById('scan-wrap');
        if (scanWrap.style.display === 'none' || !scanWrap.style.display) {
            startScanner();
        } else {
            stopScanner();
        }
    });

    document.getElementById('btn-stop-scan').addEventListener('click', stopScanner);

    // ── Kurir Pills ───────────────────────────────────────────
    document.querySelectorAll('.kurir-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.kurir-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('kurir-select').value = btn.dataset.value;
        });
    });

    function setKurirPill(name) {
        document.querySelectorAll('.kurir-pill').forEach(b => {
            b.classList.toggle('active', b.dataset.value === name);
        });
        document.getElementById('kurir-select').value = name || '';
    }

    // ── Kurir Chip ────────────────────────────────────────────
    function updateKurirChip(nomorResi) {
        const chip = document.getElementById('kurir-chip');
        if (!nomorResi) { resetKurirChip(); return; }

        chip.style.display = 'block';
        const kurir = detectKurir(nomorResi);
        setKurirPill(kurir ? kurir.name : '');
    }

    function resetKurirChip() {
        document.getElementById('kurir-chip').style.display = 'none';
        setKurirPill('');
    }

    // ── Render Antrian ────────────────────────────────────────
    function renderQueue() {
        const container = document.getElementById('queue-list');
        const emptyEl   = document.getElementById('empty-state');
        const sessions  = loadAllSessions();
        const queue     = sessions
            .filter(s => getStatus(s) === STATUS.PENDING_RESI)
            .sort((a, b) => parseDate(getWaktuDibuat(a)) - parseDate(getWaktuDibuat(b)));

        if (!queue.length) {
            container.innerHTML = '';
            emptyEl.classList.remove('d-none');
            return;
        }

        emptyEl.classList.add('d-none');

        container.innerHTML = `
            <div class="section-title" style="margin-bottom:10px;">
                ${queue.length} sesi menunggu resi
            </div>
        ` + queue.map(s => {
            const id = getSessionID(s);
            return `
                <div class="history-item" style="cursor:pointer;" data-id="${id}">
                    <i class="bi bi-box-seam-fill" style="font-size:28px;flex-shrink:0;color:var(--accent);"></i>
                    <div class="history-item-info">
                        <div class="history-item-name">${getPenerima(s)}</div>
                        <div class="history-item-sub">
                            ${getJenis(s)} · ${getPlatform(s)} · ${getPetugas(s)}
                        </div>
                        <div class="history-item-sub" style="margin-top:2px;">
                            ${formatDate(getWaktuDibuat(s))} ${formatTime(getWaktuDibuat(s))}
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                        <span class="badge badge-orange">Belum Resi</span>
                        <span class="poin-chip"><i class="bi bi-star-fill" style="font-size:11px;"></i> ${getPoin(s)}</span>
                    </div>
                </div>
            `;
        }).join('');

        // Bind klik
        container.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', () => {
                const id  = el.dataset.id;
                const ses = loadAllSessions().find(s => getSessionID(s) === id);
                if (ses) openPanel(ses);
            });
        });
    }

    // ── Fetch antrian dari server (kalau ada) ─────────────────
    async function fetchServerQueue() {
        try {
            const res    = await fetch(`${LINK_GAS}?action=get_queue&key=${API_KEY}`, { redirect: 'follow' });
            const text   = await res.text();
            const result = JSON.parse(text);
            if (result.status !== 'success' || !Array.isArray(result.data)) return;

            const serverQueue   = result.data.map(ss => normaliseSession(ss));
            const serverIds     = new Set(serverQueue.map(s => getSessionID(s)));

            // Dari lokal, buang PENDING_RESI yang sudah tidak ada di server
            // tapi pertahankan status lain (PENDING aktif, DONE, dll)
            const local    = loadAllSessions();
            const nonQueue = local.filter(s => getStatus(s) !== STATUS.PENDING_RESI);
            const merged   = [...nonQueue, ...serverQueue];

            saveAllSessions(merged);
            renderQueue();
            updateResiNavBadge();
        } catch (err) {
            console.warn('Gagal fetch server queue:', err);
        }
    }

    // ── Init ──────────────────────────────────────────────────
    updateResiNavBadge();
    renderQueue();
    fetchServerQueue();
    </script>

</body>
</html>
